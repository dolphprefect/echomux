monitor.bluez.properties = {
  bluez5.roles = [ a2dp_source ]
  # sbc_xq = high-quality SBC (up to ~530 kbps) — universally supported and
  # preferred over AAC. AAC is removed: BlueZ must encode to AAC per-speaker
  # which adds Pi CPU overhead, and some third-party speakers have buggy AAC
  # negotiation that causes link drops. SBC is the mandatory A2DP fallback.
  bluez5.codecs = [ sbc sbc_xq ]
  bluez5.default.rate = 48000
  bluez5.default.channels = 2
}
