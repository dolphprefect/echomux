# Increase the A2DP output buffer for all BT speakers.
# The default PipeWire quantum (~1024/48000 = 21ms) gives very little headroom
# for BT retransmits. With 8192/48000 (~170ms), BT retransmits are absorbed
# in the buffer without triggering xruns. This reduces stuttering when a
# speaker has marginal signal, at the cost of ~170ms added latency (fine for
# background music).
#
# monitor.bluez.rules is read by bluez.lua and applied when each BT node is
# created, AFTER the default priority.driver is set.

monitor.bluez.rules = [
  {
    matches = [{ node.name = "~bluez_output.*" }]
    actions = {
      update-props = {
        node.latency = "8192/48000"
      }
    }
  }
]
